syntax = "proto3";

package beacon.sso.v1;

import "link/base.proto";

option go_package = "github.com/phalanx-labs/beacon-sso-sdk/client/api/beacon/sso/v1;pb";

// RegisterByEmailRequest 邮箱注册请求
message RegisterByEmailRequest {
  // 邮箱地址（必填）
  string email = 1;
  // 验证码（必填）
  string code = 2;
  // 用户名（可选，不填则自动生成）
  string username = 3;
  // 密码（必填，至少 6 位且包含字母和数字）
  string password = 4;
  // 昵称（可选，不填则使用用户名或自动生成）
  string nickname = 5;
}

// RegisterByEmailResponse 邮箱注册响应
message RegisterByEmailResponse {
  // 基础响应信息
  xBase.BaseResponse base_response = 1;
  // 用户 ID（雪花 ID 格式）
  string user_id = 11;
  // 登录 Token（可用于后续认证）
  string token = 12;
}

// AuthService 认证服务（需要 App 认证）
//
// 该服务的所有方法都需要在 metadata 中提供有效的 App 凭证：
// - app-access-id: App 的 Access ID
// - app-secret-key: App 的 Secret Key
service AuthService {
  // RegisterByEmail 通过邮箱注册
  //
  // 该接口用于通过邮箱验证码完成用户注册，注册成功后自动生成登录 Token。
  // 注册流程：
  // 1. 验证邮箱验证码
  // 2. 检查邮箱是否已注册
  // 3. 验证密码强度
  // 4. 创建用户账号
  // 5. 绑定邮箱并标记为已验证
  // 6. 生成登录 Token
  rpc RegisterByEmail(RegisterByEmailRequest) returns (RegisterByEmailResponse);
}
